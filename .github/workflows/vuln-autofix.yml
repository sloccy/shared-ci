name: Go vuln auto-fix

on:
  workflow_call:
    secrets:
      pr_token:
        description: 'PAT for PR creation — skips close/reopen CI trigger workaround.'
        required: false

jobs:
  autofix:
    name: govulncheck & auto-fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan, parse, and bump vulnerable deps
        id: scan
        env:
          GOTOOLCHAIN: auto
        run: |
          set -euo pipefail

          # Exit code 3 = vulnerabilities found; allow it so the script can decide.
          govulncheck -json ./... > /tmp/vuln.json || true

          # Collect module@fixed_version for all called (symbol-level) findings.
          # finding.fixed_version is already the minimum fix >= the currently installed
          # version — no OSV range parsing needed.
          BUMPS_FILE=$(mktemp)
          jq -r '
            select(.finding) |
            select(.finding.trace[0]?.function != null) |
            select(.finding.fixed_version != null and .finding.fixed_version != "") |
            ((.finding.trace[0]?.module // "") | if . == "" then "stdlib" else . end) + "@" + .finding.fixed_version
          ' /tmp/vuln.json >> "$BUMPS_FILE"

          if [ ! -s "$BUMPS_FILE" ]; then
            echo "No called vulnerabilities found — nothing to do."
            echo "bumped=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Dedupe: per module keep the highest fixed version, so one bump covers all
          # called vulns in that module.
          # sort -k2,2V gives correct semver ordering; awk keeps the last (highest) per module.
          FINAL=$(sort -u "$BUMPS_FILE" \
            | sort -t '@' -k1,1 -k2,2V \
            | awk -F'@' '{ latest[$1] = $0 } END { for (m in latest) print latest[m] }')

          echo "Bumping: $FINAL"

          for bump in $FINAL; do
            module="${bump%%@*}"
            version="${bump##*@}"
            if [ "$module" = "stdlib" ]; then
              # fixed_version may be "goX.Y.Z" or "vX.Y.Z"; strip either prefix
              v="${version#go}"; go mod edit -go="${v#v}"
            else
              go get "$bump"
            fi
          done
          go mod tidy

          # Store bump list for the PR body.
          echo "bumped<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FINAL" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Detect token type
        id: token
        env:
          PR_TOKEN: ${{ secrets.pr_token }}
        run: |
          [ -n "$PR_TOKEN" ] && echo "use_pat=true" >> "$GITHUB_OUTPUT" || echo "use_pat=false" >> "$GITHUB_OUTPUT"

      - name: Verify no called vulns remain
        if: steps.scan.outputs.bumped != ''
        env:
          GOTOOLCHAIN: auto
        run: govulncheck ./...

      - name: Open PR
        id: create-pr
        if: steps.scan.outputs.bumped != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.pr_token || secrets.GITHUB_TOKEN }}
          branch: chore/vuln-autofix
          commit-message: "chore: bump deps for govulncheck findings"
          title: "chore: bump deps for govulncheck findings"
          labels: security,dependencies
          body: |
            Automated dependency bump for Go vulnerabilities detected by `govulncheck`.

            **Bumped modules:**
            ```
            ${{ steps.scan.outputs.bumped }}
            ```

            All changes were verified clean by a second `govulncheck` pass.

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.pr_token || secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          if [ "${{ steps.token.outputs.use_pat }}" != "true" ]; then
            gh pr close --comment "triggering CI" "$PR_NUM"
            gh pr reopen "$PR_NUM"
          fi
          gh pr merge --auto --squash "$PR_NUM"
