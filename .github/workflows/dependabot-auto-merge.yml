name: Dependabot auto-merge

on:
  workflow_call:
    secrets:
      merge_token:
        description: >-
          PAT used to enable auto-merge. Without it, auto-merge is enabled with
          GITHUB_TOKEN and the eventual merge push cannot trigger the caller repo's
          deploy/push workflows (GitHub does not let GITHUB_TOKEN events start
          workflows). Optional; merging still works without it.
        required: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge security updates (any semver level)
        if: contains(github.event.pull_request.labels.*.name, 'security')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.merge_token || secrets.GITHUB_TOKEN }}

      - name: Auto-merge non-security patch updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' &&
          !contains(github.event.pull_request.labels.*.name, 'security')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.merge_token || secrets.GITHUB_TOKEN }}
